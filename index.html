<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Water Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>💧 Water Tracker</h1>

        <div class="tracker">
            <p>Total Water Drank Today: <span id="total">0</span> ml</p>
            <input type="number" id="amount" placeholder="Enter amount (ml)">
            <button id="addButton">Add Water</button>
        </div>

        <div class="goal">
            <p>Daily Goal: 2000 ml</p>
            <div class="progress-container">
                <div id="progress-bar">0%</div>
            </div>
        </div>

        <div class="log">
            <h2>Log:</h2>
            <ul id="logList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
